name: 每日数据更新 + 部署

on:
  schedule:
    # 北京时间每天 08:00 运行 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: |
          pip install --quiet requests beautifulsoup4 playwright 2>/dev/null || true

      - name: 安装 Playwright Chromium 浏览器
        run: |
          python -m playwright install chromium --with-deps 2>/dev/null || true

      - name: 运行数据采集脚本（多源聚合）
        run: |
          python scripts/fetch-jobs.py --output public/data/campus-jobs.json --sources moka,github,company || python scripts/fetch-jobs.py --output public/data/campus-jobs.json --sample
        env:
          # 如果某个数据源失败，自动降级使用样本数据
          PYTHONUNBUFFERED: 1

      - name: 提交更新数据到仓库（触发 Cloudflare Pages 重新部署）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/campus-jobs.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "chore: 自动更新校招数据 $(date +'%Y-%m-%d')"
            git push
          fi

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装前端依赖
        run: npm ci

      - name: 构建前端
        run: npm run build

      - name: 部署到阿里云 OSS
        uses: fangbinwei/aliyun-oss-website-action@v1
        with:
          accessKeyId: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          accessKeySecret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          endpoint: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          bucket: ${{ secrets.ALIYUN_OSS_BUCKET }}
          folder: dist
          skipSetting: true
